<!DOCTYPE html>
<html>

<head>
  <title>SPOT - Profile</title>
  <link rel="stylesheet" href="/dashboard/Profile.css">
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <nav class="nav">
        <button class="nav-item active" id="nav-profile">Profile</button>
        <button class="nav-item" id="nav-reports">Report Module</button>
      </nav>

      <div class="sidebar-bottom">
        <button class="logout-btn" id="logout-btn">Back to Dashboard</button>
      </div>
    </aside>

    <main class="main">
      <h1 class="page-title" id="page-title">My Profile</h1>

      <!-- PROFILE -->
      <section class="card profile-card" id="profile-section">
        <div class="card-header">
          <h2>Profile Information</h2>
          <div class="card-actions">
            <button class="edit-btn" id="edit-btn">✎ Edit</button>
            <button class="save-btn" id="save-btn" style="display:none;">✓ Save</button>
          </div>
        </div>

        <form id="profile-form" class="profile-form">
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" readonly>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" readonly>
          </div>

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" readonly>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" readonly placeholder="Leave blank to keep current">
          </div>

          <div class="form-group">
            <label for="affiliation">Affiliation</label>
            <select id="affiliation" name="affiliation" disabled>
              <option value="" disabled selected>Select your affiliation</option>
              <option value="Aspiring Entrepreneur">Aspiring Entrepreneur</option>
              <option value="Entrepreneur">Entrepreneur</option>
            </select>
          </div>

          <div class="form-group">
            <label for="industry">Industry</label>
            <select id="industry" name="industry" disabled>
              <option value="">— Select industry —</option>
              <option value="Food and Beverages">Food and Beverages</option>
              <option value="Retail">Retail</option>
              <option value="Personal Care and Services">Personal Care and Services</option>
              <option value="Technology Digital Service">Technology Digital Service</option>
              <option value="Wholesale & Import">Wholesale &amp; Import</option>
              <option value="Manufacturing">Manufacturing</option>
              <option value="IT & Software">IT &amp; Software</option>
              <option value="BPO & Call Center">BPO &amp; Call Center</option>
              <option value="Construction">Construction</option>
              <option value="Finance & Banking">Finance &amp; Banking</option>
              <option value="Education">Education</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Energy and Fuel">Energy and Fuel</option>
              <option value="Logistics & Transport">Logistics &amp; Transport</option>
              <option value="Hospitality">Hospitality</option>
              <option value="Security Services">Security Services</option>
              <option value="Legal & Consulting">Legal &amp; Consulting</option>
              <option value="Marketing & Advertising">Marketing &amp; Advertising</option>
              <option value="Admin & Management">Admin &amp; Management</option>
              <option value="General Services">General Services</option>
            </select>
          </div>

          <div class="form-group">
            <label for="industry_specific">Specific Business / Sub-category</label>
            <input type="text" id="industry_specific" name="industry_specific" readonly
              placeholder="e.g. Pizza Resto, Coffee Shop, Barbershop">
            <small class="field-hint">Describe your specific business type within your industry.</small>
          </div>

          <div class="form-actions">
            <button type="button" class="cancel-btn" id="cancel-btn" style="display:none;">Cancel</button>
          </div>
        </form>
      </section>

      <!-- REPORT MODULE -->
      <section class="card reports-card hidden" id="reports-section">
        <div class="card-header">
          <h2>Report Module</h2>
          <div class="card-actions">
            <button class="clear-btn" id="clear-reports-btn">Clear</button>
          </div>
        </div>

        <div class="reports-grid">

          <div class="report-block">
            <div class="report-block-title">Search / Pin History</div>
            <div class="report-list scrollable" id="report-searchpins"></div>
          </div>

          <div class="report-block">
            <div class="report-block-title">Recommendation History</div>
            <div class="report-list scrollable" id="report-recs"></div>
          </div>

          <div class="report-block">
            <div class="report-block-title">Saved History</div>
            <div class="report-list scrollable" id="report-saved"></div>
          </div>

        </div>
      </section>
    </main>
  </div>

  <script src="/dashboard/Profile.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/dashboard/ProfileReport.js"></script>
</body>

</html>
