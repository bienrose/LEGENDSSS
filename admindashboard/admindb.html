<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPOT — Admin Dashboard</title>
  <link rel="stylesheet" href="/admindashboard/admindb.css">
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-avatar">
      <img src="/admin/whiteprofile.png" alt="Admin">
    </div>
    <div class="sidebar-name">Admin</div>

    <nav class="sidebar-nav">
      <a class="nav-item active" href="#" data-view="report">
        <img src="/admin/dashboard.png" class="nav-icon" alt="">
        Report<br>Module
      </a>
      <a class="nav-item" href="#" data-view="users">
        <img src="/admin/profile.png" class="nav-icon" alt="">
        Users &<br>Data
      </a>
    </nav>

    <div class="sidebar-bottom">
      <button class="nav-item" id="logout-nav-btn">
        <img src="/admin/logout.png" class="nav-icon" alt="">
        <span>Log out</span>
      </button>
    </div>
  </aside>

  <main class="main">

    <!-- REPORT MODULE VIEW -->
    <!-- REPORT MODULE VIEW -->
    <div id="view-report" class="view-panel" style="flex-direction: column;">
      <div class="section-title">User Activity History</div>
      <div class="report-filter-bar">
        <button class="report-filter-btn active" data-filter="all" id="report-filter-all">All</button>
        <button class="report-filter-btn" data-filter="search" id="report-filter-search">Map Searches</button>
        <button class="report-filter-btn" data-filter="recommendation" id="report-filter-rec">Recommendations</button>
        <button class="report-filter-btn" data-filter="saved" id="report-filter-saved">Saved / Unsaved</button>
        <button class="report-filter-btn" id="report-refresh" style="margin-left:auto;">↻ Refresh</button>
      </div>
      <div class="search-card report-full">
        <ul class="biz-list" id="user-history-list">
          <li>Loading...</li>
        </ul>
      </div>
    </div>

    <!-- USERS & DATA VIEW -->
    <div id="view-users" class="view-panel" style="display:none;">
      <div class="section-title">User Profiling</div>
      <div class="profiling-row">
        <div class="users-card">
          <div class="users-count" id="total-users">--</div>
          <div class="users-label">Users</div>
        </div>

        <div class="chart-card">
          <div class="axis-row">
            <div class="axis-labels">
              <span>0%</span>
              <span>50%</span>
              <span>100%</span>
            </div>
          </div>

          <div class="bar-chart">
            <div class="bar-row">
              <div class="bar-label">Entrepreneur</div>
              <div class="bar-track">
                <div class="bar-fill" id="bar-entrepreneur" style="width:0%">
                  <span class="bar-pct" id="pct-entrepreneur"></span>
                </div>
                <span class="bar-pct-outside" id="outside-entrepreneur" style="display:none">0%</span>
              </div>
            </div>

            <div class="bar-row">
              <div class="bar-label">Aspiring Entrepreneur</div>
              <div class="bar-track">
                <div class="bar-fill" id="bar-aspiring" style="width:0%">
                  <span class="bar-pct" id="pct-aspiring"></span>
                </div>
                <span class="bar-pct-outside" id="outside-aspiring" style="display:none">0%</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-title" style="margin-top:20px;">Update Dataset</div>
      <div class="action-btns">
        <button class="action-btn" id="add-data-btn">Add data</button>
        <button class="action-btn" id="edit-data-btn">Edit data</button>
        <button class="action-btn" id="delete-data-btn">Delete data</button>
      </div>
    </div>

  </main>

  <div class="modal-overlay" id="logout-modal">
    <div class="modal-box">
      <h3>Log Out</h3>
      <p>Are you sure you want to log out?</p>
      <div class="modal-actions">
        <button class="modal-cancel" id="cancel-logout">Cancel</button>
        <button class="modal-confirm" id="confirm-logout">Log Out</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="crud-modal">
    <div class="modal-box modal-box-large">
      <h3 id="crud-modal-title">Add Data</h3>

      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="businesses">Businesses</button>
        <button class="modal-tab" data-tab="demographics">Demographics</button>
      </div>

      <div class="modal-search" id="crud-search-section" style="display:none;">
        <input type="text" id="crud-search-input" placeholder="Search by name...">
        <select id="crud-filter-barangay" style="display:none;">
          <option value="">All Barangays</option>
        </select>
        <button class="modal-search-btn" id="crud-search-btn">Search</button>
      </div>

      <div class="modal-results" id="crud-results" style="display:none;">
        <table class="data-table" id="crud-results-table">
          <thead>
            <tr id="crud-table-header"></tr>
          </thead>
          <tbody id="crud-table-body"></tbody>
        </table>
      </div>

      <form id="crud-form" style="display:none;">
        <div id="crud-form-fields"></div>
        <div class="modal-actions">
          <button type="button" class="modal-cancel" id="crud-cancel">Cancel</button>
          <button type="submit" class="modal-confirm" id="crud-submit" style="background: var(--navy);">Save</button>
        </div>
      </form>

      <div class="modal-actions" id="crud-initial-actions">
        <button class="modal-cancel" id="crud-close">Cancel</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="delete-confirm-modal">
    <div class="modal-box">
      <h3>Confirm Delete</h3>
      <p id="delete-confirm-message">Are you sure you want to delete this record?</p>
      <div class="modal-actions">
        <button class="modal-cancel" id="delete-cancel">Cancel</button>
        <button class="modal-confirm" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="/admin/admindb.js"></script>
</body>

</html>
